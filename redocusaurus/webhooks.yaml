openapi: 3.1.0
info:
  title: Xemelgo Webhooks
  version: 1.0.0
  description: >-
    Outbound webhook events Xemelgo sends to your registered endpoint. Each
    entry is an event Xemelgo POSTs to you.
tags:
  - name: Asset
  - name: Inventory
  - name: Package
  - name: Work Order
webhooks:
  asset.bulk_update:
    post:
      summary: asset.bulk_update
      operationId: asset.bulk_update
      description: >-
        Sent when an asset bulk-update operation completes. The payload contains
        the updated assets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Unique webhook event id (UUID).
                eventTimestamp:
                  type: integer
                  description: Event time as epoch milliseconds.
                topic:
                  type: string
                  enum:
                    - asset.bulk_update
                  description: The event type.
                data:
                  type: object
                  properties:
                    assets:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: string
                          itemUpdate:
                            type: object
                            additionalProperties: true
                          location:
                            type:
                              - object
                              - 'null'
                            properties:
                              id:
                                type: string
                          previousFieldValues:
                            type: object
                            additionalProperties: true
                          uom:
                            type:
                              - string
                              - 'null'
                          uuid:
                            type: string
                    creationDate:
                      type: integer
                    customProperties:
                      type:
                        - object
                        - 'null'
                      additionalProperties: true
                    submittedAtLocationId:
                      type: string
                    submittedByUser:
                      type: object
                      properties:
                        alias:
                          type:
                            - string
                            - 'null'
                        customProperties:
                          type:
                            - object
                            - 'null'
                          additionalProperties: true
                        firstName:
                          type:
                            - string
                            - 'null'
                        lastName:
                          type:
                            - string
                            - 'null'
                    uuid:
                      type: string
            example:
              id: c1314cc5-60f7-ddba-7be3-900030a8ee05
              eventTimestamp: 1765572297000
              topic: asset.bulk_update
              data:
                assets:
                  - id: A-1
                    itemUpdate:
                      quantityAdded: 1
                    location:
                      id: L-1
                    previousFieldValues: {}
                    uom: EA
                    uuid: 11111111-1111-4111-8111-111111111111
                creationDate: 1765420060123
                customProperties: null
                submittedAtLocationId: 1-Z
                submittedByUser:
                  alias: person1
                  customProperties: {}
                  firstName: door
                  lastName: dash
                uuid: 11111111-1111-4111-8111-111111111111
      responses:
        2XX:
          description: Return any 2xx status to acknowledge receipt.
      tags:
        - Asset
      x-stability: stable
